<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Travel Agent ✈️</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
      color: #fff;
    }

    h1 { font-size: 2rem; margin-bottom: 6px; text-align: center; }

    .subtitle {
      font-size: 0.95rem;
      color: #a0c4d8;
      margin-bottom: 24px;
      text-align: center;
    }

    /* ── API key inputs ── */
    #api-section {
      width: 100%;
      max-width: 740px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #api-section input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #3a6186;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.9rem;
    }

    #api-section input::placeholder { color: #7a9ab0; }

    /* ── Agent status bar ── */
    #agent-status {
      width: 100%;
      max-width: 740px;
      margin-bottom: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .agent-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      border: 1px solid rgba(255,255,255,0.15);
      color: #a0c4d8;
      background: rgba(255,255,255,0.05);
      transition: all 0.3s;
    }

    .agent-badge.active {
      background: rgba(26,115,232,0.3);
      border-color: #1a73e8;
      color: #fff;
    }

    .agent-badge.done {
      background: rgba(46,204,113,0.2);
      border-color: #2ecc71;
      color: #7dd4a8;
    }

    /* ── Chat window ── */
    #chat-box {
      width: 100%;
      max-width: 740px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 20px;
      height: 520px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 88%;
      line-height: 1.6;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .message.user {
      background: #1a73e8;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: rgba(255,255,255,0.1);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.thinking {
      background: rgba(255,255,255,0.07);
      align-self: flex-start;
      color: #a0c4d8;
      font-style: italic;
      font-size: 0.88rem;
      border-bottom-left-radius: 4px;
    }

    /* Live update lines */
    .live-update {
      align-self: flex-start;
      font-size: 0.82rem;
      color: #a0c4d8;
      padding: 5px 12px;
      background: rgba(255,255,255,0.05);
      border-left: 3px solid #1a73e8;
      border-radius: 0 8px 8px 0;
      max-width: 90%;
      line-height: 1.4;
    }

    .live-update.done  {
      color: #7dd4a8;
      border-left-color: #2ecc71;
    }

    .live-update.error {
      color: #f4a261;
      border-left-color: #e07b39;
    }

    /* ── Input bar ── */
    #input-area {
      display: flex;
      width: 100%;
      max-width: 740px;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #3a6186;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }

    #user-input::placeholder { color: #7a9ab0; }
    #user-input:disabled { opacity: 0.5; cursor: not-allowed; }

    #send-btn {
      padding: 12px 22px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled) { background: #1558b0; }
    #send-btn:disabled { background: #3a5068; cursor: not-allowed; }

    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <h1>✈️ AI Travel Agent</h1>
  <p class="subtitle">
    Powered by 4 specialist AI agents working together to find your perfect trip!
  </p>

  <!-- API key inputs -->
  <div id="api-section">
    <input
      type="text"
      id="api-key"
      placeholder="🔑 Paste your Claude API key here..."
    />
    <input
      type="text"
      id="serp-api-key"
      placeholder="🔍 Paste your SerpApi key here for live flight data..."
    />
  </div>

  <!-- Agent status badges -->
  <div id="agent-status">
    <span class="agent-badge" id="badge-orchestrator">🎯 Orchestrator</span>
    <span class="agent-badge" id="badge-destination">🌍 Destination Agent</span>
    <span class="agent-badge" id="badge-flight">✈️ Flight Agent</span>
    <span class="agent-badge" id="badge-weather">🌤️ Weather Agent</span>
    <span class="agent-badge" id="badge-recommendation">⭐ Recommendation Agent</span>
  </div>

  <div id="chat-box"></div>

  <div id="input-area">
    <input
      type="text"
      id="user-input"
      placeholder="Type your message and press Enter..."
      onkeydown="if(event.key==='Enter') sendMessage()"
    />
    <button id="send-btn" onclick="sendMessage()">Send ✈️</button>
  </div>

  <!-- Load all agent files -->
  <script src="destination-agent.js"></script>
  <script src="weather-agent.js"></script>
  <script src="flight-agent.js"></script>
  <script src="recommendation-agent.js"></script>
  <script src="orchestrator.js"></script>

  <script>
    // ── State ──
    let conversationHistory = [];
    let isAgentRunning = false;
    let currentThinkingId = null;

    // ── Agent badge mapping ──
    const AGENT_BADGES = {
      "Destination Agent": "badge-destination",
      "Flight Agent":      "badge-flight",
      "Weather Agent":     "badge-weather",
      "Recommendation Agent": "badge-recommendation",
      "Orchestrator":      "badge-orchestrator"
    };

    // ── Welcome message on load ──
    window.onload = () => {
      setAgentActive("orchestrator");
      addMessage(
        "assistant",
        `👋 Hi! I'm your AI Travel Agent — now powered by 4 specialist agents!\n\n` +
        `🎯 Orchestrator — talks to you and coordinates everything\n` +
        `🌍 Destination Agent — finds matching destinations worldwide\n` +
        `✈️ Flight Agent — searches real flights via Google Flights\n` +
        `🌤️ Weather Agent — checks conditions at each destination\n` +
        `⭐ Recommendation Agent — analyses all results and recommends the best option\n\n` +
        `To get started, just tell me you'd like to plan a trip! ✈️`
      );
    };

    // ── Send message ──
    async function sendMessage() {
      const apiKey     = document.getElementById("api-key").value.trim();
      const serpApiKey = document.getElementById("serp-api-key").value.trim();
      const userInput  = document.getElementById("user-input").value.trim();

      if (!apiKey) { alert("Please paste your Claude API key first!"); return; }
      if (!userInput || isAgentRunning) return;

      isAgentRunning = true;
      setInputEnabled(false);

      addMessage("user", userInput);
      document.getElementById("user-input").value = "";
      currentThinkingId = addThinking("💭 Orchestrator is thinking...");
      setAgentActive("orchestrator");

      try {
        await runOrchestrator(
          userInput,
          conversationHistory,
          apiKey,
          serpApiKey,

          // onUpdate — live progress messages
          (message) => {
            removeThinking();

            // Detect which agent is active from message content
            if (message.includes("Destination Agent")) setAgentActive("destination");
            else if (message.includes("Flight Agent"))  setAgentActive("flight");
            else if (message.includes("Weather Agent")) setAgentActive("weather");
            else if (message.includes("Recommendation Agent")) setAgentActive("recommendation");

            // Style based on message type
            const isDone  = message.startsWith("✅");
            const isError = message.startsWith("⚠️");
            addLiveUpdate(
              message,
              isError ? "error" : isDone ? "done" : ""
            );

            // Show new thinking indicator after updates
            if (!isDone && !isError) {
              currentThinkingId = addThinking("⏳ Working...");
            }
          },

          // onFinalReply — agent text responses
          (text, isIntermediate) => {
            removeThinking();
            if (text && text.trim()) {
              addMessage("assistant", text);
            }
            if (isIntermediate) {
              currentThinkingId = addThinking("🔍 Searching now...");
            }
          }
        );

      } catch (error) {
        removeThinking();
        addMessage(
          "assistant",
          "⚠️ Something went wrong: " + error.message +
          "\n\nPlease check your API keys and try again."
        );
      }

      // Mark recommendation agent as done when finished
      setAgentDone("recommendation");
      isAgentRunning = false;
      setInputEnabled(true);
      setAgentActive("orchestrator");
    }

    // ── UI helpers ──
    function addMessage(role, text) {
      const chatBox = document.getElementById("chat-box");
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      chatBox.appendChild(div);
      scrollToBottom();
    }

    function addLiveUpdate(text, modifier) {
      const chatBox = document.getElementById("chat-box");
      const div = document.createElement("div");
      div.className = "live-update" + (modifier ? " " + modifier : "");
      div.textContent = text;
      chatBox.appendChild(div);
      scrollToBottom();
    }

    function addThinking(text) {
      removeThinking();
      const chatBox = document.getElementById("chat-box");
      const id = "thinking-" + Date.now();
      const div = document.createElement("div");
      div.id = id;
      div.className = "message thinking";
      div.textContent = text;
      chatBox.appendChild(div);
      scrollToBottom();
      return id;
    }

    function removeThinking() {
      if (currentThinkingId) {
        const el = document.getElementById(currentThinkingId);
        if (el) el.remove();
        currentThinkingId = null;
      }
    }

    function scrollToBottom() {
      const chatBox = document.getElementById("chat-box");
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function setInputEnabled(enabled) {
      document.getElementById("send-btn").disabled   = !enabled;
      document.getElementById("user-input").disabled = !enabled;
    }

    // ── Agent badge helpers ──
    function setAgentActive(agentKey) {
      // Reset all badges
      Object.values({
        orchestrator: "badge-orchestrator",
        destination:  "badge-destination",
        flight:       "badge-flight",
        weather:      "badge-weather",
        recommendation: "badge-recommendation"
      }).forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.classList.remove("active");
        }
      });

      // Set active badge
      const badgeId = `badge-${agentKey}`;
      const badge   = document.getElementById(badgeId);
      if (badge) badge.classList.add("active");
    }

    function setAgentDone(agentKey) {
      const badge = document.getElementById(`badge-${agentKey}`);
      if (badge) {
        badge.classList.remove("active");
        badge.classList.add("done");
      }
    }
  </script>

</body>
</html>

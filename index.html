<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Travel Agent ✈️</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
      color: #fff;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #a0c4d8;
      margin-bottom: 24px;
      text-align: center;
    }

    /* ── API key input ── */
    #api-section {
      width: 100%;
      max-width: 740px;
      margin-bottom: 16px;
    }

    #api-section input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #3a6186;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.9rem;
    }

    #api-section input::placeholder { color: #7a9ab0; }

    /* ── Chat window ── */
    #chat-box {
      width: 100%;
      max-width: 740px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 20px;
      height: 520px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    /* ── Message bubbles ── */
    .message {
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 88%;
      line-height: 1.6;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    /* User messages — blue, right aligned */
    .message.user {
      background: #1a73e8;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    /* Agent replies — grey, left aligned */
    .message.assistant {
      background: rgba(255,255,255,0.1);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    /* Thinking indicator — animated dots */
    .message.thinking {
      background: rgba(255,255,255,0.07);
      align-self: flex-start;
      color: #a0c4d8;
      font-style: italic;
      font-size: 0.88rem;
      border-bottom-left-radius: 4px;
    }

    /* Live update messages — compact progress lines */
    .live-update {
      align-self: flex-start;
      font-size: 0.82rem;
      color: #a0c4d8;
      padding: 5px 12px;
      background: rgba(255,255,255,0.05);
      border-left: 3px solid #1a73e8;
      border-radius: 0 8px 8px 0;
      max-width: 90%;
      line-height: 1.4;
    }

    /* Completion updates — slightly brighter */
    .live-update.done {
      color: #7dd4a8;
      border-left-color: #2ecc71;
    }

    /* Error updates */
    .live-update.error {
      color: #f4a261;
      border-left-color: #e07b39;
    }

    /* ── Input bar ── */
    #input-area {
      display: flex;
      width: 100%;
      max-width: 740px;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #3a6186;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }

    #user-input::placeholder { color: #7a9ab0; }

    #user-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #send-btn {
      padding: 12px 22px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled) { background: #1558b0; }

    #send-btn:disabled {
      background: #3a5068;
      cursor: not-allowed;
    }

    /* ── Scrollbar styling ── */
    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <h1>✈️ AI Travel Agent</h1>
  <p class="subtitle">
    Tell me about your trip — I'll search destinations, compare flights and find the best deal!
  </p>

  <div id="api-section">
    <input
      type="password"
      id="api-key"
      placeholder="🔑 Paste your Claude API key here to start..."
    />
  </div>

  <div id="chat-box"></div>

  <div id="input-area">
    <input
      type="text"
      id="user-input"
      placeholder="Type your message and press Enter..."
      onkeydown="if(event.key==='Enter') sendMessage()"
    />
    <button id="send-btn" onclick="sendMessage()">Send ✈️</button>
  </div>


  <!-- Load tools and agent before the UI logic below -->
  <script src="tools.js"></script>
  <script src="agent.js"></script>

  <script>
    // ── State ──
    const apiKey = document.getElementById("api-key").value.trim();
    let conversationHistory = [];
    let isAgentRunning = false;
    let currentThinkingId = null;

    // ── Show welcome message on load ──
    window.onload = () => {
      addMessage(
        "assistant",
        `👋 Hi! I'm your AI Travel Agent.\n\n` +
        `I'll help you find the best flights and destinations by searching ` +
        `across multiple travel windows and comparing all options for you.\n\n` +
        `To get started, just tell me you'd like to plan a trip — ` +
        `and I'll guide you through everything step by step! ✈️`
      );
    };


    // ── Main send function ──
    async function sendMessage() {
      const apiKey   = document.getElementById("api-key").value.trim() || MY_API_KEY;
      const userInput = document.getElementById("user-input").value.trim();

      if (!apiKey) {
        alert("Please paste your Claude API key first!");
        return;
      }
      if (!userInput || isAgentRunning) return;

      // Lock UI while agent is running
      isAgentRunning = true;
      setInputEnabled(false);

      // Show user message and clear input
      addMessage("user", userInput);
      document.getElementById("user-input").value = "";

      // Show initial thinking indicator
      currentThinkingId = addThinking("💭 Agent is thinking...");

      try {
        await runAgent(
          userInput,
          conversationHistory,
          apiKey,

          // ── onUpdate callback — called before AND after each tool ──
          (toolName, input, result) => {
            removeThinking();

            // Build the progress message
            const msg = buildUpdateMessage(toolName, input, result);

            // Before tool runs (result is undefined) → show start message
            // After tool runs (result exists) → show completion message
            const isDone  = result !== undefined;
            const isError = isDone && result && result.error;

            addLiveUpdate(
              msg,
              isError ? "error" : isDone ? "done" : ""
            );
          },

          // ── onFinalReply callback — called for intermediate and final text ──
          (text, isIntermediate) => {
            removeThinking();
            if (text && text.trim()) {
              addMessage("assistant", text);
            }

            // If it's an intermediate message (agent talking before tool calls),
            // show a new thinking indicator for what comes next
            if (isIntermediate) {
              currentThinkingId = addThinking("🔍 Searching now...");
            }
          }
        );

      } catch (error) {
        removeThinking();
        addMessage(
          "assistant",
          "⚠️ Something went wrong: " + error.message +
          "\n\nPlease check your API key and try again."
        );
      }

      // Unlock UI
      isAgentRunning = false;
      setInputEnabled(true);
    }


    // ── UI helper functions ──

    function addMessage(role, text) {
      const chatBox = document.getElementById("chat-box");
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      chatBox.appendChild(div);
      scrollToBottom();
    }

    function addLiveUpdate(text, modifier) {
      const chatBox = document.getElementById("chat-box");
      const div = document.createElement("div");
      div.className = "live-update" + (modifier ? " " + modifier : "");
      div.textContent = text;
      chatBox.appendChild(div);
      scrollToBottom();
    }

    function addThinking(text) {
      const chatBox = document.getElementById("chat-box");
      const id = "thinking-" + Date.now();
      const div = document.createElement("div");
      div.id = id;
      div.className = "message thinking";
      div.textContent = text;
      chatBox.appendChild(div);
      scrollToBottom();
      return id;
    }

    function removeThinking() {
      if (currentThinkingId) {
        const el = document.getElementById(currentThinkingId);
        if (el) el.remove();
        currentThinkingId = null;
      }
    }

    function scrollToBottom() {
      const chatBox = document.getElementById("chat-box");
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function setInputEnabled(enabled) {
      document.getElementById("send-btn").disabled   = !enabled;
      document.getElementById("user-input").disabled = !enabled;
    }
  </script>

</body>
</html>
